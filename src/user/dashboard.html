<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mon Blog</title>
    <link rel="stylesheet" href="/src/style.css"> 
    <link rel="icon" type="image/png" href="../assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    <script type="module">
        import { dashboard } from '../userAuteur.js';
        dashboard();
    </script>
</head>
<body class="bg-gray-100">

    <header>
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="../../index.html"><div class="text-2xl font-bold text-blue-600 tektur">DevEtDemain</div></a>
            <div class="flex gap-4">
                <span id="user-name" class="text-gray-700  username ">User Name</span>
                <button id="logout-btn" class="text-red-500 cursor-pointer  logout">
                    <img src="../assets/logout.png" alt="" class="w-5">
                </button>
            </div>
        </div> 

        <div class="bg-gray-800 text-white py-3 px-6 flex justify-center gap-8">
            <a href="/src/user/dashboard.html" class="hover:text-blue-400">Dashboard</a>
            <a href="/src/user/create-article.html" class="hover:text-blue-400">Nouvel article</a>
            <a href="/src/user/drafts.html" class="hover:text-blue-400">Brouillons</a>
            <a href="/src/user/profile.html" class="hover:text-blue-400">Profil</a>
        </div>         
    </header>

    <main class="max-w-7xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold mb-6">Tableau de bord</h1>

        <!-- Stats rapides -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="bg-white p-5 rounded-lg shadow text-center border-t-4 border-blue-500">
                <div class="text-3xl font-bold text-blue-600        articlesPublished">12</div>
                <div class="text-gray-500">Articles publiés</div>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center border-t-4 border-green-500">
                <div class="text-3xl font-bold text-green-600       drafts">3</div>
                <div class="text-gray-500">Brouillons</div>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center border-t-4 border-yellow-500">
                <div class="text-3xl font-bold text-yellow-600      views">1.2k</div>
                <div class="text-gray-500">Vues totales</div>
            </div>
            <div class="bg-white p-5 rounded-lg shadow text-center border-t-4 border-purple-500">
                <div class="text-3xl font-bold text-purple-600      comments">45</div>
                <div class="text-gray-500">Commentaires reçus</div>
            </div>
        </div>

        <!-- Liste des articles -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-2xl font-bold">Mes articles</h2>
            <a href="/src/user/create-article.html" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">+ Nouvel article</a>
        </div>

        <div class="space-y-4   article_container-js">
            <!-- toute les articles ICI -->
        </div>
    </main>



    <template id="article_template-js">
        <div class="bg-white rounded-lg shadow p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <img src="../assets/article4.jpg" alt="" class="articleCover cursor-vertical-text   w-full md:max-w-60 rounded-2xl h-40 object-cover">
            <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                    <span class="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700  status">Publié</span>
                    <span class="text-xs text-gray-400     publishedAt">15 mars 2025</span>
                </div>
                <h3 class="text-xl font-semibold mb-1     title">Comprendre JavaScript</h3>
                <p class="text-gray-500 text-sm       excerpt">Les bases essentielles pour débuter en JavaScript...</p>
            </div>
            <div class="flex gap-2 flex-row md:flex-col">
                <a href="/src/user/comments.html" class="comments text-blue-600 px-3 py-1 border rounded bg-gray-200 border-none">
                    <img src="../assets/commentaires.png" alt="" class="w-6 mx-auto  ">
                </a>
                <a href="/src/user/edit-article.html" class=" update text-blue-600px-3 py-1  border rounded bg-blue-200 border-none">
                    <img src="../assets/editer.png" alt="" class="w-6 mx-auto  ">
                </a>
                <button class="text-red-600 hover:text-red-800 px-3 py-1 border rounded bg-red-200 border-none">
                    <img src="../assets/supprimer.png" alt="" class="w-6 mx-auto" meta-articleId="">
                </button>
            </div>
        </div>
    </template>
</body>
</html>
