<!DOCTYPE html>
<html lang="fr" class="custom-scrollbar-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Mon Blog</title>
    <link rel="stylesheet" href="/src/style.css"> 
    <link rel="icon" type="image/png" href="../assets/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    <script type="module">
        import { loginRequest } from '../auth.js';
        loginRequest();
    </script>
    <script type="module">
        import { modal } from '../logique_front/fonctions/modal.js';
        modal(); 
    </script>
    <link rel="stylesheet" href="../modal.css">
</head>
<body class="bg-gray-100">
    <header class="h-fit">
        <!-- ==================== PREMIÈRE NAVBAR ==================== -->
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="/" class="hover:text-blue-400">
                <div class="text-2xl tektur font-bold text-blue-600  hidden md:block">DevEtDemain</div>
                <img src="../assets/logo.jpg" alt="" class="w-8 h-8 rounded-2xl  md:hidden">
            </a>
            <div class="flex gap-4 items-center">
                <span class="md:border-2 md:border-gray-500 p-1 rounded-full md:w-30 cursor-pointer flex flex-row items-center text-xs   searchModal">
                    <img src="../assets/rechercher.png" alt="" class="w-6 h-6">
                    <span class="hidden md:inline-block">Ctrl+k</span>
                </span>

                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/facebook.png" alt="" class="w-5">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/twitter.png" alt="" class="w-4">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/instagram.png" alt="" class="w-4">
                </a>
                <a href="/src/public/register.html" class="bg-blue-600 w-8 h-8 flex justify-center items-center text-white  rounded-full hover:bg-blue-700 transition">
                    <img src="../assets/add.png" alt="" class="w-6 h-6 invert brightness-0">
                </a>
                <!-- <a href="/src/public/register.html" class=" text-gray-600 px-4 py-2 rounded-lg outline-2 outline-blue-700">S'inscrire</a> -->
            </div>
        </div>

        <!-- ==================== DEUXIÈME NAVBAR ==================== -->
        <div class="bg-gray-800 text-sm md:text-base text-white py-3 px-6 flex flex-wrap justify-center gap-6   navLink">
            <a href="/" class="hover:text-blue-400 hover:border-b-2">Accueil</a>
            <a href="/src/public/category.html?id=tech" class="hover:text-blue-400 hover:border-b-2 ">Catégories ›</a>
            <a href="/src/public/about.html" class="hover:text-blue-400 hover:border-b-2">À propos</a>
            <a href="/src/public/contact.html" class="border-b-2">Contact</a>
        </div> 
    </header>

    <!-- Structure de la modale -->
    <div class="modal_container-js" id="" style="display:none"> 
        <div class="modal_wrapper-js   text-white bg-blue-700 w-full md:w-1/2 mx-auto my-6 rounded-2xl flex flex-col gap-3 p-2">
            <div class="flex items-center gap-1">
                <div class="search  border-2 border-gray-50  h-9 rounded-lg md:w-30 cursor-pointer flex flex-row items-center text-xs searchModal">
                    <img src="../assets/rechercher.png" alt="" class="w-5 h-5 p-0.5 invert">
                    <input type="search" placeholder="Rechercher par titre ou tag..." class="inputSearch placeholder:text-white w-full h-full outline-none" >
                </div>  
                <img src="../assets/x.png" alt="" class="w-5 h-5 p-0.5 cursor-pointer invert  close_modal-js">              
            </div>


            <div class="wrapper-js   flex flex-col gap-3">
                <!-- Résultats fictifs -->
                <div class="article_modal_container-js  space-y-2  custom-scrollbar-html  max-h-[65vh] overflow-y-scroll">
                    <template id="tpl">
                        <a href="" class="">
                            <div class="result-item  hover:rounded-lg p-1 hover:bg-blue-900  grid grid-cols-1 md:grid-cols-5 gap-3">
                                <span class="result-date md:text-right font-extralight      publishedAt">15 mai 2025</span>
                                <span class="result-title col-span-4 font-bold     title">Comprendre JavaScript : les bases essentielles</span>
                            </div>  
                        </a>
                    </template>                   
                </div>
                <p class="text-center inline mx-auto text-sm font-bold underline-offset-3 transition-all duration-2000"><span class="result_of_searching-js">10</span> résultats trouvés</p>
            </div>

        </div>
    </div>


    <div class="flex justify-center items-center min-h-[80vh]">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Connexion</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email</label>
                    <input name="email" type="email" id="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Mot de passe</label>
                    <input name="password"  type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Se connecter</button>
            </form>
            <p class="text-center text-gray-600 mt-4">Pas encore de compte ? <a href="/src/public/register.html" class="text-blue-600 hover:underline">Inscrivez-vous</a></p>
        </div>
    </div>

    <footer class="bg-white text-center py-6 mt-10 text-gray-500">
        © 2025 DevEtDemain
    </footer>

</body>
</html>
