<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Mon Blog</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="icon" type="image/png" href="../assets/favicon.ico"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet"> 
    <script type="module">
        import { logoutRequest } from '../auth.js';
        logoutRequest();
    </script>
</head>
<body class="bg-gray-100">

    <header class="h-fit">
        <!-- ==================== PREMIÈRE NAVBAR ==================== -->
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="/" class="hover:text-blue-400"><div class="text-2xl font-bold text-blue-600 tektur">DevEtDemain</div></a>
            <div class="flex gap-4 items-center">
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/facebook.png" alt="" class="w-5">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/twitter.png" alt="" class="w-4">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/instagram.png" alt="" class="w-4">
                </a>
                <a href="/src/public/login.html" class="bg-blue-600 text-white p-0.5 rounded-full hover:bg-blue-700 transition">
                    <img src="../assets/login.png" alt="" class="w-7 h-7 invert brightness-0">
                </a>
            </div>
        </div>

        <!-- ==================== DEUXIÈME NAVBAR ==================== -->
        <div class="bg-gray-800 text-white py-3 px-6 flex flex-wrap justify-center gap-6">
            <a href="/" class="hover:text-blue-400 hover:border-b-2">Accueil</a>
            <a href="/src/public/category.html?id=tech" class="hover:text-blue-400 hover:border-b-2 ">Catégories ›</a>
            <a href="/src/public/about.html" class="hover:text-blue-400 hover:border-b-2">À propos</a>
            <a href="/src/public/contact.html" class="hover:text-blue-400 border-b-2 border-transparent hover:border-blue-400">Contact</a>
        </div>  
    </header>

    <div class="flex justify-center items-center min-h-[80vh]">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Inscription</h2>
            <form id="register-form">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Nom d'utilisateur</label>
                    <input name="username" type="text" id="username" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">Email</label>
                    <input name="email" type="email" id="email" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">Mot de passe</label>
                    <input name="password" type="password" id="password" class="w-full px-3 py-2 border rounded-lg" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">S'inscrire</button>
            </form>
        </div>
    </div>

    <footer class="bg-white text-center py-6 mt-10 text-gray-500">
        © 2025 DevEtDemain
    </footer>


</body>
</html>
