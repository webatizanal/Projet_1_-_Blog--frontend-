<!DOCTYPE html>
<html lang="fr" class="custom-scrollbar-htmlReset">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catégorie - Mon Blog</title>
    
    <!-- Tailwind CSS (CDN) -->
    <!-- <script src="https://cdn.tailwindcss.com"></script> -->
    
    <!-- CSS perso -->
    <link rel="stylesheet" href="/src/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { category } from '../main.js';
        category();
    </script>
    <script type="module">
        import { modal } from '../logique_front/fonctions/modal.js';
        modal(); 
    </script>
    <script type="module" src="../logique_front/fonctions/responsive.js"></script>
    <link rel="stylesheet" href="../modal.css">
    <link rel="icon" type="image/png" href="../assets/favicon.ico">
</head>
<body class="bg-gray-100"> 
    <header class="h-fit">
        <!-- ==================== PREMIÈRE NAVBAR ==================== -->
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="/" class="hover:text-blue-400">
                <div class="text-2xl tektur font-bold text-blue-600  hidden md:block">DevEtDemain</div>
                <img src="../assets/logo.jpg" alt="" class="w-8 h-8 rounded-2xl  md:hidden">
            </a>
            <div class="flex gap-4 items-center">
                <span class="md:border-2 md:border-gray-500 p-1 rounded-full md:w-30 cursor-pointer flex flex-row items-center text-xs   searchModal">
                    <img src="../assets/rechercher.png" alt="" class="w-6 h-6">
                    <span class="hidden md:inline-block">Ctrl+k</span>
                </span>

                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/facebook.png" alt="" class="w-5">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/twitter.png" alt="" class="w-4">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/instagram.png" alt="" class="w-4">
                </a>
                <a href="/src/public/login.html" class="bg-blue-600 text-white p-0.5 rounded-full hover:bg-blue-700 transition">
                    <img src="../assets/login.png" alt="" class="w-7 h-7 invert brightness-0">
                </a>
            </div>
        </div>

        <!-- ==================== DEUXIÈME NAVBAR ==================== -->
        <div class="bg-gray-800 text-sm md:text-base text-white py-3 px-6 flex flex-wrap justify-center gap-6   navLink">
            <a href="/" class="hover:text-blue-400 hover:border-b-2">Accueil</a>
            <a href="/src/public/category.html?id=tech" class=" border-b-2">Catégories ›</a>
            <a href="/src/public/about.html" class="hover:text-blue-400 hover:border-b-2">À propos</a>
            <a href="/src/public/contact.html" class="hover:text-blue-400 hover:border-b-2">Contact</a>
        </div> 
    </header>

    <!-- Structure de la modale -->
    <div class="modal_container-js" id="" style="display:none"> 
        <div class="modal_wrapper-js   text-white bg-blue-700 w-full md:w-1/2 mx-auto my-6 rounded-2xl flex flex-col gap-3 p-2">
            <div class="flex items-center gap-1">
                <div class="search  border-2 border-gray-50  h-9 rounded-lg md:w-30 cursor-pointer flex flex-row items-center text-xs searchModal">
                    <img src="../assets/rechercher.png" alt="" class="w-5 h-5 p-0.5 invert">
                    <input type="search" placeholder="Rechercher par titre ou tag..." class="inputSearch placeholder:text-white w-full h-full outline-none" >
                </div>  
                <img src="../assets/x.png" alt="" class="w-5 h-5 p-0.5 cursor-pointer invert  close_modal-js">              
            </div>


            <div class="wrapper-js   flex flex-col gap-3">
                <!-- Résultats fictifs -->
                <div class="article_modal_container-js  space-y-2  custom-scrollbar-html  max-h-[65vh] overflow-y-scroll">
                    <template id="tpl">
                        <a href="" class="">
                            <div class="result-item  hover:rounded-lg p-1 hover:bg-blue-900  grid grid-cols-1 md:grid-cols-5 gap-3">
                                <span class="result-date md:text-right font-extralight      publishedAt">15 mai 2025</span>
                                <span class="result-title col-span-4 font-bold     title">Comprendre JavaScript : les bases essentielles</span>
                            </div>  
                        </a>
                    </template>                   
                </div>
                <p class="text-center inline mx-auto text-sm font-bold underline-offset-3 transition-all duration-2000"><span class="result_of_searching-js">10</span> résultats trouvés</p>
            </div>

        </div>
    </div>



    <div class="flex md:flex-row-reverse relative"> 
        <span class="open bg-blue-100 absolute top-5 left-0 p-2 hamburger cursor-pointer rounded-r-2xl border border-blue-400 z-30">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6  text-indigo-500">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z" />
            </svg>
        </span>


        <!-- Contenu principal -->
        <main class="mt-5 w-full px-4 max-h-[100vh] overflow-y-scroll custom-scrollbar-html ">
            <div class="overlay fixed inset-0 bg-black/50 opacity-0 invisible transition-all duration-300 z-40"></div>
            <!-- Liste des articles -->
            <div id="articles-list" class="max-w-7xl  mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8   recent_article_container-js">
                <!-- les articles ICI -->
            </div>

            <!-- Pagination -->
            <div class="flex justify-center flex-wrap gap-3 my-5 text-xs   paginationBox">
                <!-- les bouton de navigation -->
            </div>
        </main> 

        <aside class="w-80 -translate-x-full absolute top-0 left-0 shrink-0 space-y-6 mt-5 asideCategory max-h-[100vh] overflow-y-scroll custom-scrollbar-hamburger  rounded-xl border border-gray-200 bg-white p-5 shadow-sm transition-all duration-500 ease-in-out z-50">
            <!-- Bloc : Catégories -->
            <div class=" ">
                <h3 class="mb-4 flex items-center justify-between gap-2 text-lg font-semibold text-gray-800">
                    Catégories
                    <span class="bg-blue-100 p-2 close cursor-pointer rounded-r-2xl border border-blue-400">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6  text-indigo-500">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 12h16.5m-16.5 3.75h16.5M3.75 19.5h16.5M5.625 4.5h12.75a1.875 1.875 0 0 1 0 3.75H5.625a1.875 1.875 0 0 1 0-3.75Z" />
                        </svg>
                    </span>
                </h3>
                <div class="max-h-[50vh] overflow-y-auto pr-1 custom-scrollbar">
                    <div class="space-y-2.5   category_container-js">
                        <!-- Catégorie active (exemple) -->
                        <label id="all" class="allAttached flex cursor-pointer items-center justify-between rounded-lg bg-indigo-50 px-3 py-2 text-indigo-700 transition hover:bg-indigo-100">
                            <span class="flex items-center gap-2 text-sm font-medium">
                                <input type="checkbox" class="allCategory size-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" checked>
                                Toutes les catégories
                            </span>
                            <span class="text-xs font-medium  countCategory"></span>
                        </label>

                        <!-- Les autres categories -->
                    </div>
                </div>
            </div>

            <!-- Bloc : Auteur -->
            <div class=" ">
                <h3 class="mb-4 flex items-center gap-2 text-lg font-semibold text-gray-800">
                    Auteurs
                </h3>
                <div class="max-h-[50vh] overflow-y-auto pr-1 custom-scrollbar">
                    <div class="space-y-2.5   auteur_container-js">
                        <!-- Catégorie active (exemple) -->
                        <label id="all" class="allAttached flex cursor-pointer items-center justify-between rounded-lg bg-indigo-50 px-3 py-2 text-indigo-700 transition hover:bg-indigo-100">
                            <span class="flex items-center gap-2 text-sm font-medium">
                                <input type="checkbox" class="allAuthor size-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500" checked>
                                Tous les auteurs
                            </span>
                            <span class="text-xs font-medium  countAuteur"></span>
                        </label>

                        <!-- Les auteurs -->
                    </div>
                </div>
            </div>
        </aside>
    </div>




    <template id="recent_article_element-js">
        <div id="idArticle" data-categoryid="" data-authorid="" class="article-card bg-white rounded-lg shadow-md overflow-hidden    recent_article_element">
            <img src="https://picsum.photos/id/0/400/250" alt="Article tech" class="w-full h-48 object-cover">
            <div class="p-5">
                <div class="text-xs text-blue-600 font-semibold mb-2"><span class="cat">Tech • </span> <span class="readTime">15</span> de lecture</div>
                <h2 class="text-xl font-bold mb-2">Les tendances tech 2025</h2>
                <p class="text-gray-600 mb-4 resume">Découvrez ce qui va marquer l'industrie cette année...</p>
                <a href="/src/public/article.html?id=1" class="text-blue-600 font-medium hover:underline">Lire l'article →</a>
            </div>
        </div>
    </template>

    <template id="category_element-js">
        <label id="" class="flex cursor-pointer items-center justify-between rounded-lg px-3 py-2 text-gray-700 transition hover:bg-gray-100">
            <span class="flex items-center gap-2 text-sm">
                <input type="checkbox" class="thisCat size-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <span class="name">Tech</span>
            </span>
            <span class="text-xs text-gray-400   attached">12</span>
        </label>
    </template>

    <template id="auteur_element-js">
        <label id="" class="flex cursor-pointer items-center justify-between rounded-lg px-3 py-2 text-gray-700 transition hover:bg-gray-100">
            <span class="flex items-center gap-2 text-sm">
                <input type="checkbox" class="thisAuthor size-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <span class="username">Paul</span>
            </span>
            <span class="text-xs text-gray-400   attached">12</span>
        </label>
    </template>
</body>
</html>
