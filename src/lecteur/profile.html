<!DOCTYPE html>
<html lang="fr" class="custom-scrollbar-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon profil - MonBlog</title>
    <link rel="stylesheet" href="/src/style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    <style>
        .avatar-preview {
            transition: transform 0.2s ease;
        }
        .avatar-preview:hover {
            transform: scale(1.05);
        }
    </style>
    <script type="module">
        import { profile } from '../userLecteur.js';
        profile();
    </script>
</head>
<body class="bg-gray-100">

    <header class="h-fit">
        <!-- ==================== PREMIÈRE NAVBAR ==================== -->
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="/" class="hover:text-blue-400"><div class="text-2xl font-bold text-blue-600 tektur">DevEtDemain</div></a>
            <div class="flex gap-4 items-center">
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/facebook.png" alt="" class="w-5">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/twitter.png" alt="" class="w-4">
                </a>
                <a href="#" class="text-gray-600 hover:text-blue-500">
                    <img src="../assets/instagram.png" alt="" class="w-4">
                </a>
                <a href="/src/public/login.html" class="bg-blue-600 text-white p-0.5 rounded-full hover:bg-blue-700 transition">
                    <img src="../assets/login.png" alt="" class="w-7 h-7 invert brightness-0">
                </a>
            </div>
        </div>

        <!-- ==================== DEUXIÈME NAVBAR ==================== -->
        <div class="bg-gray-800 text-white py-3 px-6 flex flex-wrap justify-center gap-6">
            <a href="/" class="hover:text-blue-400 border-b-2 border-transparent hover:border-blue-400">Accueil</a>
            <a href="/src/public/category.html?id=tech" class="hover:text-blue-400 border-b-2 border-transparent hover:border-blue-400">Catégories ›</a>
            <a href="/src/public/about.html" class="hover:text-blue-400 border-b-2 border-transparent hover:border-blue-400">À propos</a>
            <a href="/src/public/contact.html" class="hover:text-blue-400 border-b-2 border-transparent hover:border-blue-400">Contact</a>
        </div>  
    </header>

    <main class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <!-- En-tête avec avatar -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 px-6 py-8 text-white">
                <div class="flex flex-col items-center">
                    <!-- Avatar avec prévisualisation -->
                    <div class="relative mb-4 group">
                        <div id="avatar-container" class="w-24 h-24 rounded-full bg-white/20 backdrop-blur flex items-center justify-center overflow-hidden border-4 border-white shadow-lg avatar-preview">
                            <img id="avatar-img" src="" alt="Avatar" class="w-full h-full object-cover hidden">
                            <span id="avatar-initials" class="text-4xl font-bold text-white"></span>
                        </div>
                        <label for="avatar-upload" class="absolute bottom-0 right-0 bg-white rounded-full p-1.5 shadow-md cursor-pointer hover:bg-gray-100 transition">
                            <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </label>
                        <input type="file" id="avatar-upload" class="hidden" accept="image/*">
                    </div>
                    <h2 id="profile-username" class="text-xl font-bold   username">Chargement...</h2>
                    <p id="profile-email" class="text-blue-100 text-sm   userMail">email@exemple.com</p>
                </div>
            </div>

            <!-- Formulaire de modification -->
            <div class="p-6 space-y-6">
                <!-- Message de notification -->
                <div id="message-area" class="hidden"></div>

                <!-- Changement de mot de passe -->
                <div class="border-b pb-6">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        Changer le mot de passe
                    </h3>
                    <form id="password-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe actuel</label>
                            <input name="currentPassword" type="password" id="current-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
                            <input name="newPassword" type="password" id="new-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
                            <input name="confirmPassword" type="password" id="confirm-password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Mettre à jour le mot de passe</button>
                    </form>
                </div>

                <!-- Suppression de compte -->
                <div class="pt-4">
                    <h3 class="text-lg font-semibold text-red-600 mb-4 flex justify-between items-center gap-2">
                        <span class="flex items-center">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                            Zone dangereuse                            
                        </span>
                        <button id="logout-btn" title="Déconnecter" class="flex justify-center items-center text-red-500 cursor-pointer w-16 h-16 bg-gray-100 rounded-full  logout">
                            <img src="../assets/logout.png" alt="" class="w-5">
                        </button>
                    </h3>
                    <button id="delete-account-btn" class="delete cursor-pointer   bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition">Supprimer mon compte</button>
                    <p class="text-xs text-gray-500 mt-2">Cette action est irréversible. Tous vos articles seront également supprimés.</p>
                </div>
            </div>
        </div>
    </main>


</body>
</html>
