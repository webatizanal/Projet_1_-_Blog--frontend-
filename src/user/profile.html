<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Mon Blog</title>
    <link rel="stylesheet" href="/src/style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100">

    <header>
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <div class="text-2xl font-bold text-blue-600 tektur">MonBlog</div>
            <div class="flex gap-4">
                <span id="user-name" class="text-gray-700">User Name</span>
                <button id="logout-btn" class="text-red-500">Déconnexion</button>
            </div>
        </div>

        <div class="bg-gray-800 text-white py-3 px-6 flex justify-center gap-8">
            <a href="/src/user/dashboard.html" class="hover:text-blue-400">Dashboard</a>
            <a href="/src/user/create-article.html" class="hover:text-blue-400">Nouvel article</a>
            <a href="/src/user/drafts.html" class="hover:text-blue-400">Brouillons</a>
            <a href="/src/user/profile.html" class="hover:text-blue-400">Profil</a>
        </div>           
    </header>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <!-- En-tête du profil -->
            <div class="p-6 text-white">
                <div class="flex items-center gap-6">
                    <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center text-4xl text-blue-600 font-bold shadow-lg">
                        A
                    </div>
                    <div>
                        <h1 class="text-3xl font-bold">Alex Martin</h1>
                        <p class="text-blue-100">@alex_martin</p>
                        <p class="text-sm mt-1">Membre depuis janvier 2025</p>
                    </div>
                </div>
            </div>

            <!-- Corps du profil -->
            <div class="p-6 space-y-6">
                <div class="border-b pb-4">
                    <h2 class="text-xl font-bold mb-4">✏️ Informations personnelles</h2>
                    <form id="profile-form" class="space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Nom d'utilisateur</label>
                                <input type="text" value="Alex Martin" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                <input type="email" value="alex@monblog.com" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Bio</label>
                            <textarea rows="3" class="w-full p-2 border rounded" placeholder="Parlez-nous de vous...">Développeur full-stack passionné par le web moderne. J'écris des articles pour partager mes découvertes et aider la communauté.</textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Site web / Portfolio</label>
                            <input type="url" value="https://alexmartin.dev" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Avatar</label>
                            <input type="file" accept="image/*" class="w-full p-2 border rounded">
                            <p class="text-xs text-gray-500 mt-1">Formats acceptés : JPG, PNG (max 2 Mo)</p>
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Mettre à jour le profil</button>
                        </div>
                    </form>
                </div>

                <div class="border-b pb-4">
                    <h2 class="text-xl font-bold mb-4">🔐 Changer de mot de passe</h2>
                    <form id="password-form" class="space-y-4 max-w-md">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe actuel</label>
                            <input type="password" class="w-full p-2 border rounded" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nouveau mot de passe</label>
                            <input type="password" class="w-full p-2 border rounded" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Confirmer le mot de passe</label>
                            <input type="password" class="w-full p-2 border rounded" required>
                        </div>
                        <div>
                            <button type="submit" class="bg-gray-800 text-white px-6 py-2 rounded-lg hover:bg-gray-900">Changer le mot de passe</button>
                        </div>
                    </form>
                </div>

                <!-- Statistiques personnelles -->
                <div>
                    <h2 class="text-xl font-bold mb-4">📊 Mes statistiques</h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-gray-50 p-4 rounded text-center">
                            <div class="text-2xl font-bold text-blue-600">12</div>
                            <div class="text-sm text-gray-500">Articles</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded text-center">
                            <div class="text-2xl font-bold text-green-600">1.2k</div>
                            <div class="text-sm text-gray-500">Vues totales</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded text-center">
                            <div class="text-2xl font-bold text-purple-600">45</div>
                            <div class="text-sm text-gray-500">Commentaires</div>
                        </div>
                        <div class="bg-gray-50 p-4 rounded text-center">
                            <div class="text-2xl font-bold text-yellow-600">3</div>
                            <div class="text-sm text-gray-500">Brouillons</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
