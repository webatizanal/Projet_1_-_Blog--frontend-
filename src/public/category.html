                            <span class="text-xs font-medium  count">24</span>

                                <span class="text-amber-500">★★★★</span>
                                <span class="text-gray-400">★</span>
                                <span class="text-sm text-gray-500">(4)</span>

                        </span>

                    <label class="three flex cursor-pointer items-center justify-between rounded-lg px-2 py-1 hover:bg-gray-50">

                                <span class="text-sm text-gray-500">(3)</span>

                    <!-- 2 étoiles -->

                    <label class="one flex cursor-pointer items-center justify-between rounded-lg px-2 py-1 hover:bg-gray-50">
