<!DOCTYPE html>

</head>
<body class="bg-gray-100">

    <header class="h-fit">
        <!-- ==================== PREMIÈRE NAVBAR ==================== -->
        <div class="bg-white shadow-md py-4 px-6 flex justify-between items-center">
            <a href="/src/public/index.html" class="hover:text-blue-400"><div class="text-2xl font-bold text-blue-600 tektur">🍃 MonBlog</div></a>
            <div class="flex gap-4 items-center">
                <img src="../assets/rechercher.png" alt="" class="w-6 h-6">
                <a href="#" class="text-gray-600 hover:text-blue-500">FB</a>
                <a href="#" class="text-gray-600 hover:text-blue-500">X</a>
                <a href="#" class="text-gray-600 hover:text-blue-500">IG</a>
                <a href="/src/public/login.html" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Connexion</a>
            </div>
        </div>

        <!-- ==================== DEUXIÈME NAVBAR ==================== -->
        <div class="bg-gray-800 text-white py-3 px-6 flex flex-wrap justify-center gap-6">
            <a href="/src/public/index.html" class="hover:text-blue-400">Accueil</a>

    <main class="max-w-4xl mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold mb-6">Contactez-nous</h1>
        <form id="contact-form" class="bg-white p-6 rounded shadow">
            <input type="text" placeholder="Votre nom" class="w-full mb-4 p-2 border rounded">
            <input type="email" placeholder="Votre email" class="w-full mb-4 p-2 border rounded">
            <textarea placeholder="Votre message" rows="5" class="w-full mb-4 p-2 border rounded"></textarea>
            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Envoyer</button>
        </form>
    </main>
